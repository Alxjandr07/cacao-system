<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CacaoGest</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cacaogest.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: var(--cream);
    }

    /* ── PANEL IZQUIERDO ── */
    .login-left {
      width: 50%;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--sidebar-bg1) 0%, var(--sidebar-bg2) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }
    .login-left-img {
      width: 260px;
      height: 260px;
      object-fit: contain;
      margin-bottom: 32px;
      opacity: 0.92;
    }
    .login-left-brand {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 56px;
      letter-spacing: -1px;
      line-height: 1;
      text-align: center;
      margin-bottom: 16px;
    }
    .login-left-brand .cacao { color: #ffffff; }
    .login-left-brand .gest  { color: var(--green); }
    .login-left-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
    }

    /* ── PANEL DERECHO ── */
    .login-right {
      width: 50%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0px 10px 40px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
    }
    .login-card-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-user-icon {
      width: 64px;
      height: 64px;
      background: var(--cream);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
      border: 0.8px solid var(--border-color);
    }
    .login-card-header h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 24px;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .login-card-header p {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: rgba(0,0,0,0.5);
    }
    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 12px;
    }
    .login-fields .field input {
      background: #e2e2e2;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
    }
    .login-fields .field input:focus {
      border: 0.8px solid var(--green);
      background: #fff;
    }
    .login-error {
      background: #ffc7c3;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #ff6357;
      font-family: 'Inter', sans-serif;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .login-error.show { display: flex; }
    .btn-login {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 16px;
    }
    .btn-login:hover { background: var(--green-dark); }
    .login-forgot {
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--green);
      cursor: pointer;
      margin-bottom: 32px;
    }
    .login-footer {
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-footer-icon {
      font-size: 20px;
    }
  </style>
</head>
<body>

<!-- PANEL IZQUIERDO -->
<div class="login-left">
  <img class="login-left-img" src="img/cacao-1.svg" alt="Cacao" onerror="this.style.fontSize='80px';this.outerHTML='<div style=\'font-size:80px;margin-bottom:32px\'>🫘</div>'">
  <div class="login-left-brand">
    <span class="cacao">CACAO</span><span class="gest">GEST</span>
  </div>
  <p class="login-left-sub">Sistema de registro de producción y venta de cacao</p>
</div>

<!-- PANEL DERECHO -->
<div class="login-right">
  <div class="login-card">
    <div class="login-card-header">
      <div class="login-user-icon">👤</div>
      <h2>Bienvenido de nuevo</h2>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <div class="login-fields">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="username" placeholder="Tu nombre de usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <div class="login-error" id="loginError">
      <span>⚠</span>
      <span id="loginErrorMsg">Contraseña incorrecta. Intenta de nuevo.</span>
    </div>

    <button class="btn-login" onclick="login()">Iniciar sesión</button>

    <div class="login-forgot">¿Olvidaste tu contraseña?</div>

    <div class="login-footer">
      <span class="login-footer-icon">✅</span>
      <span>Sistema seguro y protegido</span>
    </div>
  </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
